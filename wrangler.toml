name = "file-store-bot"
main = "src/index.ts"
compatibility_date = "2024-03-31"

[vars]
STORAGE_CHANNEL_ID = "YOUR_STORAGE_CHANNEL_ID"
BACKUP_STORAGE_ID = "YOUR_BACKUP_STORAGE_ID"
ADMIN_UID = "YOUR_ADMIN_TELEGRAM_ID"
ADMIN_API_KEY = "YOUR_CUSTOM_ADMIN_KEY"
RENDER_URL = "https://your-broadcast-engine.onrender.com"
# Note: BOT_TOKEN must be set via 'wrangler secret put BOT_TOKEN'
# BOT_TOKEN = "HIDDEN"

[[d1_databases]]
binding = "DB"
database_name = "DB"
database_id = "91a716f2-f082-43da-ba5c-0f0e71b979c2"

[triggers]
crons = ["*/5 * * * *"]